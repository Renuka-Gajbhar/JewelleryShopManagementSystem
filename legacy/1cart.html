<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style type="text/css">
    * {
      margin: 0;
      padding: 0;
    }

    .cart {
      border: 2px solid black;
      height: 450px;
      width: 450px;

    }
  </style>
</head>

<body>
  <div class="cart">
  <h2>Your Cart</h2>
    <img src="download (5).jpg" alt="">
    <div class="details">
      <h4>Gold Necklace</h4>
      <p>₹ 4,500</p>
      <div class="qty">
        <button>-</button>
        <input type="text" value="1">
        <button>+</button>
      </div>
    </div>
    <button class="remove">Remove</button>
  </div>

  <div class="total-box">
    <h3>Total: ₹ 4,500</h3>
    <button class="checkout">Checkout</button>
  </div>

  </div>


</body>

</html>
